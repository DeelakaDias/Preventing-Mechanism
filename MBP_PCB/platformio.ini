[env:adafruit_metro_esp32s3]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino
#lib_deps = Seeed-Studio/Seeed_Arduino_LIS3DHTR
monitor_speed=115200
monitor_filters = colorize